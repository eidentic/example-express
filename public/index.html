<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eidentic Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    header span {
      font-size: 0.8rem;
      color: #888;
    }

    #chat-container {
      width: 100%;
      max-width: 760px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      gap: 12px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.93rem;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bubble.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }

    .bubble.assistant.thinking::after {
      content: "▋";
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      width: 100%;
      max-width: 760px;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: #f5f5f5;
      border-top: 1px solid #e5e5e5;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d4d4d4;
      border-radius: 24px;
      font-size: 0.93rem;
      outline: none;
      resize: none;
      background: #fff;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      field-sizing: content;
    }

    #message-input:focus {
      border-color: #1a73e8;
    }

    #send-btn {
      padding: 10px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.93rem;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
      align-self: flex-end;
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send-btn:hover:not(:disabled) {
      background: #155db1;
    }
  </style>
</head>
<body>
  <header>
    <h1>Eidentic Chat</h1>
    <span>Memory-backed · powered by eidentic</span>
  </header>

  <div id="chat-container"></div>

  <div id="input-area">
    <textarea
      id="message-input"
      placeholder="Type a message… (Enter to send)"
      rows="1"
    ></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    // Stable session id — persisted in localStorage so the agent remembers
    // across page reloads.
    const SESSION_KEY = "eidentic_session_id";
    let sessionId = localStorage.getItem(SESSION_KEY);
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem(SESSION_KEY, sessionId);
    }

    const chatContainer = document.getElementById("chat-container");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");

    function appendBubble(role, text) {
      const el = document.createElement("div");
      el.className = `bubble ${role}`;
      el.textContent = text;
      chatContainer.appendChild(el);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;

      appendBubble("user", message);

      // Streaming assistant bubble
      const assistantBubble = appendBubble("assistant", "");
      assistantBubble.classList.add("thinking");

      let responseText = "";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, sessionId }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          assistantBubble.textContent = "Error: " + (err.error || response.statusText);
          assistantBubble.classList.remove("thinking");
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          // SSE format: lines starting with "data: "
          const lines = buffer.split("\n");
          buffer = lines.pop() ?? ""; // keep incomplete last line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6).trim();
            if (!raw) continue;

            let ev;
            try { ev = JSON.parse(raw); } catch { continue; }

            // stream.delta carries the text delta — ev.delta.text
            if (ev.type === "stream.delta" && ev.delta?.text) {
              responseText += ev.delta.text;
              assistantBubble.textContent = responseText;
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // result event means the run is complete
            if (ev.type === "result") {
              assistantBubble.classList.remove("thinking");
            }

            // surface error events
            if (ev.type === "error") {
              assistantBubble.textContent = "Error: " + ev.error;
              assistantBubble.classList.remove("thinking");
            }
          }
        }

        // If we got content but never received a result event, clean up anyway
        assistantBubble.classList.remove("thinking");

        // Fallback: if no deltas arrived but the result has output, show it
        if (!responseText && assistantBubble.textContent === "") {
          assistantBubble.textContent = "(no response)";
        }
      } catch (err) {
        assistantBubble.textContent = "Error: " + (err.message || String(err));
        assistantBubble.classList.remove("thinking");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
